<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yearshot — library &amp; schedule</title>
<meta name="robots" content="noindex">
<style>
:root{--bg:#101014;--surface:#1a1a20;--s2:#24242c;--line:#34343e;--text:#f2f0eb;
  --dim:#9a97a0;--mute:#6b6872;--accent:#e8a33d;--green:#4caf6e;--red:#e05252;--blue:#3987e5}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1240px;margin:0 auto;padding:26px 20px 80px}
h1{font-family:Georgia,serif;letter-spacing:3px;font-size:22px}
.sub{color:var(--dim);font-size:13px;margin:4px 0 18px}
h2{font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);
  margin:30px 0 12px;font-weight:600}

.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.stat b{display:block;font-size:24px;font-variant-numeric:tabular-nums;color:var(--accent)}
.stat span{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}

.day{background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;margin-bottom:12px}
.day.today{border-color:var(--accent)}
.day.past{opacity:.5}
.day-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.day-date{font-weight:700}
.day-num{color:var(--dim);font-variant-numeric:tabular-nums}
.tag{font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:999px}
.tag.today{background:rgba(232,163,61,.18);color:var(--accent)}
.tag.past{background:var(--s2);color:var(--mute)}
.tag.ok{background:rgba(76,175,110,.15);color:var(--green)}
.tag.warn{background:rgba(224,82,82,.14);color:var(--red)}
.rounds{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.rd{background:var(--s2);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.rd img{width:100%;height:104px;object-fit:cover;background:#000;cursor:zoom-in;display:block}
.rd .meta{padding:7px 8px;font-size:11px;color:var(--dim);line-height:1.45}
.rd .yr{color:var(--text);font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
.rd .slot{float:right;color:var(--mute)}
.chip{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-top:3px;
  background:#2e2e37;color:var(--dim)}
.chip.c{background:rgba(57,135,229,.16);color:#7db3f0}
.dbadge{font-variant-numeric:tabular-nums;color:var(--mute)}

.pool{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.pool .rd img{height:92px}
.empty{color:var(--mute);font-size:13px;padding:14px 0}
.bar{display:grid;grid-template-columns:104px 1fr 34px;gap:8px;align-items:center;
  font-size:12px;color:var(--dim);margin-bottom:4px}
.bar i{display:block;height:12px;border-radius:3px;background:var(--blue);min-width:2px}
.bar i.over{background:var(--accent)}
.bar b{text-align:right;color:var(--text)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:24px}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);display:none;align-items:center;
  justify-content:center;flex-direction:column;gap:10px;z-index:50;cursor:zoom-out;padding:24px}
#lightbox.on{display:flex}
#lightbox img{max-width:100%;max-height:84vh;object-fit:contain;border-radius:6px}
#lightbox .cap{color:var(--dim);font-size:13px;text-align:center;max-width:820px}
.err{color:var(--red);font-size:13px}
@media(max-width:900px){.rounds{grid-template-columns:repeat(2,1fr)}.cols{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h1>LIBRARY &amp; SCHEDULE</h1>
  <p class="sub">Everything accepted, and how it is batched into upcoming days. Local view — run from
    <code>tools/</code> with the project served locally.</p>

  <div class="summary" id="summary"></div>

  <h2>Upcoming days</h2>
  <div id="days"></div>

  <h2>Accepted but not yet scheduled</h2>
  <div class="pool" id="pool"></div>

  <h2>Coverage</h2>
  <div class="cols">
    <div><h4 style="font-size:11px;color:var(--dim);margin-bottom:7px">TOPICS</h4><div id="cov-topics"></div></div>
    <div><h4 style="font-size:11px;color:var(--dim);margin-bottom:7px">COUNTRIES</h4><div id="cov-countries"></div></div>
  </div>
</div>
<div id="lightbox"><img alt="full size"><div class="cap"></div></div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const today = new Date().toISOString().slice(0, 10);

// Grid thumbnails come from Commons at ~240px. The local assets are full-size
// (~1MB each) and forty of them at once is 40MB for a page you only scan —
// the local file is still what the lightbox opens.
function thumb(img) {
  return "https://commons.wikimedia.org/wiki/Special:FilePath/"
    + encodeURIComponent(img.commonsFile) + "?width=240";
}
function full(img) { return "../assets/" + img.id + ".jpg"; }

function card(img, slot) {
  const d = document.createElement("div"); d.className = "rd";
  const im = document.createElement("img");
  im.src = thumb(img); im.loading = "lazy"; im.alt = img.blurb || img.id;
  im.onclick = () => {
    $("lightbox").querySelector("img").src = full(img);
    $("lightbox").querySelector(".cap").textContent =
      `${img.year} · ${img.topic} · ${img.country} — ${img.blurb || img.id}`;
    $("lightbox").classList.add("on");
  };
  const m = document.createElement("div"); m.className = "meta";
  m.innerHTML = `<span class="yr">${img.year}</span>`
    + (slot ? `<span class="slot">R${slot} · d${img.difficulty}</span>` : `<span class="slot">d${img.difficulty}</span>`)
    + `<br><span class="chip">${img.topic}</span> <span class="chip c">${img.country}</span>`;
  d.append(im, m);
  return d;
}

fetch("../content/library.json", { cache: "no-cache" })
  .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then((lib) => {
    const images = Object.fromEntries(lib.images.map((i) => [i.id, i]));
    const schedule = lib.schedule || {};
    const dates = Object.keys(schedule).sort();
    const launch = new Date("2026-07-21");
    const scheduledIds = new Set(Object.values(schedule).flat());
    const pool = lib.images.filter((i) => !scheduledIds.has(i.id));
    const future = dates.filter((d) => d >= today);

    $("summary").innerHTML = [
      [lib.images.length, "accepted photos"],
      [dates.length, "days scheduled"],
      [future.length, "days remaining"],
      [pool.length, "unscheduled"],
      [new Set(lib.images.map((i) => i.country)).size, "countries"],
      [new Set(lib.images.map((i) => i.topic)).size, "topics"],
    ].map(([n, l]) => `<div class="stat"><b>${n}</b><span>${l}</span></div>`).join("");

    // Days, newest-relevant first: today and future, then past.
    const host = $("days");
    for (const date of dates) {
      const ids = schedule[date];
      const imgs = ids.map((i) => images[i]).filter(Boolean);
      const num = Math.round((new Date(date) - launch) / 86400000) + 1;
      const el = document.createElement("div");
      el.className = "day" + (date === today ? " today" : date < today ? " past" : "");

      const topics = imgs.map((i) => i.topic), countries = imgs.map((i) => i.country);
      const dupTopic = topics.length - new Set(topics).size;
      const dupCountry = countries.length - new Set(countries).size;

      const head = document.createElement("div"); head.className = "day-head";
      head.innerHTML = `<span class="day-date">${date}</span>`
        + `<span class="day-num">#${String(num).padStart(3, "0")}</span>`
        + (date === today ? `<span class="tag today">today</span>`
           : date < today ? `<span class="tag past">played</span>` : "")
        + `<span class="tag ${dupTopic ? "warn" : "ok"}">${new Set(topics).size}/5 topics</span>`
        + `<span class="tag ${dupCountry > 1 ? "warn" : "ok"}">${new Set(countries).size}/5 countries</span>`
        + `<span class="day-num dbadge">difficulty ${imgs.map((i) => i.difficulty).join("")}</span>`;

      const rounds = document.createElement("div"); rounds.className = "rounds";
      imgs.forEach((img, i) => rounds.appendChild(card(img, i + 1)));
      el.append(head, rounds);
      host.appendChild(el);
    }
    if (!dates.length) host.innerHTML = '<div class="empty">Nothing scheduled.</div>';

    $("pool").innerHTML = "";
    if (!pool.length) $("pool").innerHTML = '<div class="empty">All accepted photos are scheduled.</div>';
    else pool.forEach((img) => $("pool").appendChild(card(img)));

    const tally = (k) => {
      const m = new Map();
      for (const i of lib.images) m.set(i[k], (m.get(i[k]) || 0) + 1);
      return [...m.entries()].sort((a, b) => b[1] - a[1]);
    };
    const bars = (rows, hostEl, overShare) => {
      const max = Math.max(1, ...rows.map((r) => r[1]));
      hostEl.innerHTML = "";
      for (const [name, n] of rows) {
        const row = document.createElement("div"); row.className = "bar";
        const bar = document.createElement("i");
        bar.style.width = (n / max * 100) + "%";
        if (n / lib.images.length > overShare) bar.classList.add("over");
        const wrap = document.createElement("span"); wrap.appendChild(bar);
        row.innerHTML = `<span>${name}</span>`;
        row.appendChild(wrap);
        const b = document.createElement("b"); b.textContent = n;
        row.appendChild(b);
        hostEl.appendChild(row);
      }
    };
    bars(tally("topic"), $("cov-topics"), 0.17);
    bars(tally("country"), $("cov-countries"), 0.25);
  })
  .catch((e) => {
    $("summary").innerHTML = `<div class="err">Could not load ../content/library.json (${e.message}).
      Serve the project locally: <code>python3 -m http.server 8471</code></div>`;
  });

$("lightbox").addEventListener("click", () => $("lightbox").classList.remove("on"));
document.addEventListener("keydown", (e) => { if (e.key === "Escape") $("lightbox").classList.remove("on"); });
</script>
</body>
</html>
